# Constelación del memorándum — registro local (personal, no Cordada).
#
# La unidad de trabajo no es un agente suelto: es el equipo que lleva el memo
# a estándar mundial. Cada rol tiene una memoria (qué lee), un trabajo, y un
# eval que CORRE OTRO — nunca él mismo. Tres reglas, fail-closed:
#   1. Ningún rol valida su propio trabajo (el gate lo corre otro).
#   2. Ningún rol pasa sin un eval que de verdad se pueda correr.
#   3. Cada dato que entra a la página está auditado por dos fuentes/ojos
#      independientes — lo no doble-verificado no entra.
#
# Gates ejecutables:
#   constelacion/eval_constelacion.py  (las tres leyes sobre este catalogo)
#   constelacion/eval_lector.py        (gate de AG-LECTOR-INVERSIONISTA, era memo)
#   constelacion/eval_citabilidad.py   (gate de AG-EMPAQUETADOR-CITABLE, era memo)
#   constelacion/eval_sitio.py         (gate determinista de la constelacion del sitio)
#
# ARCHIVO HISTORICO (03-jul-2026, orden CEO de la forja fundacional): los 9
# roles de la era del memo quedan ARCHIVADOS como registro — prohibido
# reutilizarlos para el sitio (P12 de la spec). La constelacion vigente para
# el sitio es la seccion "CONSTELACION DEL SITIO" al final de este archivo.

agentes:

  - slug: AG-AUDITOR-EVIDENCIA
    rol: Auditor de evidencia
    hace: Verifica cada cifra del memo contra dos fuentes independientes; marca lo que no se puede doble-verificar.
    memoria:
      semantica: [SIFMA, BIS, IMF GFSR, Preqin, CMF, Superintendencia de Pensiones, Banco Central de Chile]
      episodica: constelacion/runs/AG-AUDITOR-EVIDENCIA/
      procedural: busqueda web + tabla claim->fuente1->fuente2
    eval:
      gate: dos auditores ciegos deben coincidir; el adversario marca toda cifra sin fuente. Lo corre el harness + AG-ADVERSARIO-MEMO, no él.
      estado: ejecutable
    metricas: [cifras sin doble fuente al cierre (target 0)]

  - slug: AG-JURISTA-REGULATORIO
    rol: Jurista regulatorio
    hace: Factibilidad legal chilena con norma citada; separa derecho vigente de propuesta; marca dónde hay reserva legal.
    memoria:
      semantica: [Ley 18.045 Titulo XVIII, DL 3.500 art. 45, DFL 251, Ley 18.876, leychile.cl, cmfchile.cl]
      episodica: constelacion/runs/AG-JURISTA-REGULATORIO/
      procedural: lectura de norma primaria + tabla vigente/gap/requiere-Congreso
    eval:
      gate: AG-VERIFICADOR-CITAS confirma cada norma; AG-ADVERSARIO-MEMO ataca la reserva legal. Lo corren otros.
      estado: ejecutable
    metricas: [normas citadas sin fuente primaria (target 0)]

  - slug: AG-VERIFICADOR-CITAS
    rol: Verificador de citas
    hace: Fija el número de artículo y la fuente exacta de cada cita legal que aparece en la página.
    memoria:
      semantica: [leychile.cl, bcn.cl, cmfchile.cl, spensiones.cl]
      episodica: constelacion/runs/AG-VERIFICADOR-CITAS/
      procedural: doble verificación contra fuente primaria
    eval:
      gate: dos verificadores ciegos coinciden contra leychile/CMF. Lo corre el harness, no él.
      estado: ejecutable
    metricas: [citas con numero de articulo no confirmado (target 0)]

  - slug: AG-ARQUITECTO-TESIS
    rol: Arquitecto de la tesis
    hace: Integra la tesis defensiva (separacion funcional) con la constructiva (cupo de renta fija); arma el hilo claim->evidencia->implicacion.
    memoria:
      semantica: [index.html, hallazgos del jurista, hallazgos del adversario]
      episodica: constelacion/runs/AG-ARQUITECTO-TESIS/
      procedural: mapa del argumento + gap-analysis
    eval:
      gate: AG-ADVERSARIO-MEMO no puede dejar un salto logico sin respuesta en el cuerpo. Lo corre el adversario.
      estado: ejecutable
    metricas: [saltos logicos sin respuesta en el cuerpo (target 0)]

  - slug: AG-PRODUCTOR-PAGINA
    rol: Productor de la pagina
    hace: Edita el HTML a estandar mundial reusando los componentes existentes; nada de rediseno. Accesibilidad y citas.
    memoria:
      semantica: [index.html, componentes de estilo existentes, WCAG]
      episodica: constelacion/runs/AG-PRODUCTOR-PAGINA/
      procedural: edicion quirurgica + verificacion de anclas de footnotes
    eval:
      gate: workflow de verificacion sobre el draft final (cada claim + cada ancla fn). Lo corre el harness.
      estado: ejecutable
    metricas: [footnotes rotas o claims sin fuente en el draft (target 0)]

  - slug: AG-ADVERSARIO-MEMO
    rol: Adversario
    hace: >
      Lee el memo como el lector mas hostil posible (abogado CMF, comite de
      riesgo AFP, gestor aludido); ataca cada salto y cada cifra.
      ENRIQUECIDO 03-jul — lente del aludido: lee ademas como el abogado de
      cualquier actor vivo del mercado que pudiera sentirse apuntado por la
      pagina; el documento debe sostenerse como politica publica neutral, no
      como pieza contra un actor identificable.
    memoria:
      semantica: [el memo completo, catalogo de modos de falla, casos 2008/Madoff/Wirecard]
      episodica: constelacion/runs/AG-ADVERSARIO-MEMO/
      procedural: red-team multi-lente, objeciones rankeadas por letalidad + test del aludido (barrido de frases señalables)
    eval:
      gate: INVERTIDO — su salida ES el gate de publicacion (0 golpes letales sin respuesta; 0 frases señalables como ataque a un actor identificable; 0 menciones con nombre a actores vivos del mercado local fuera de casos con resolucion regulatoria publica).
      estado: ejecutable
    metricas: [golpes letales sin respuesta al cierre (target 0), frases señalables por el abogado de un aludido (target 0)]

  - slug: AG-SINTETIZADOR
    rol: Sintetizador
    hace: Deduplica hallazgos; arma el ledger de evidencia (solo lo doble-confirmado) y la lista rankeada de ediciones.
    memoria:
      semantica: [salidas de todos los demas roles]
      episodica: constelacion/runs/AG-SINTETIZADOR/
      procedural: dedup + ranking + critico de completitud
    eval:
      gate: el ledger solo admite lo doble-confirmado; un critico de completitud independiente revisa que no falte. Lo corre otro.
      estado: ejecutable
    metricas: [hallazgos sin doble fuente que igual entraron al ledger (target 0)]

  # ── Forja 03-jul-2026 · WF-FORJAR-EQUIPO (modo mixto) ──
  # Encargo: la pagina gana el relato como REFERENCIA citable ante
  # inversionistas institucionales, MFO y prensa financiera. Cuello:
  # citabilidad/distribucion (la calidad ya la garantiza el equipo del memo;
  # lo que falta es que la citen).
  # PROMOCION 03-jul-2026: primera corrida O→M→D ejecutada (capa MFO,
  # run 2026-07-03-capa-mfo.md) — evals implementados y verdes →
  # propuesta → activa.

  - slug: AG-LECTOR-INVERSIONISTA
    rol: Lector inversionista institucional / MFO
    estado: activa
    hace: >
      Lee la pagina como un CIO institucional, un multi-family office o un
      aportante final decidiendo si citarla y usarla: lista toda pregunta que
      un lector asi haria y la pagina no responde (o no declara como gap), y
      destila el checklist accionable del aportante ("las preguntas que un
      aportante deberia hacer a su administrador") que la pagina puede
      ofrecer como herramienta descargable. Frontera con el adversario: el
      adversario ataca la verdad de lo escrito; este rol pregunta lo que
      FALTA para decidir e invertir.
    memoria:
      semantica: [index.html, "Cerebro:exogeno/estudios/cios-chilenos-benchmarking-global/ (universo institucional chileno + panteon global)", "Cerebro:endogeno/digestos/ (frentes vivos del mercado de alternativos)"]
      episodica: constelacion/runs/AG-LECTOR-INVERSIONISTA/
      procedural: checklist de preguntas por tipo de lector (CIO AFP · aseguradora · MFO · aportante final) + tabla pregunta->respuesta-en-pagina->gap
    eval:
      gate: 0 preguntas de su checklist sin respuesta ni gap declarado en la pagina al cierre de corrida; la letalidad/pertinencia de las preguntas la juzga AG-ADVERSARIO-MEMO (lente hostil) — lo corren el harness + el adversario, no el.
      estado: ejecutable — constelacion/eval_lector.py (L01-L04 sobre la tabla pregunta->estado en runs/AG-LECTOR-INVERSIONISTA/)
    metricas: [preguntas de inversionista sin respuesta ni gap declarado (target 0), preguntas del checklist adoptadas como herramienta publica de la pagina (señal de valor)]

  - slug: AG-EMPAQUETADOR-CITABLE
    rol: Empaquetador de citabilidad y distribucion
    estado: activa
    hace: >
      Convierte la pagina en la referencia mas facil de citar del tema en
      Chile: PDF real descargable (no window.print), one-pager ejecutivo,
      hoja de datos citables (cada cifra con su footnote doble-auditada),
      footnotes con enlace a fuente primaria (leychile/CMF/SIFMA/FMI),
      metadata de citacion (schema.org + canonical + fecha machine-readable +
      anchors por cifra), changelog publico visible y seccion de metodologia
      ("como se audito este documento": dos fuentes por cifra + red-team).
      REGLA DURA: no introduce ni reformula ningun claim — solo empaqueta lo
      que ya paso por AG-AUDITOR-EVIDENCIA y AG-VERIFICADOR-CITAS.
    memoria:
      semantica: [index.html, og-cover.html, og-cover.svg, constelacion/runs/2026-06-30-memo-clase-mundial.md]
      episodica: constelacion/runs/AG-EMPAQUETADOR-CITABLE/
      procedural: builder de PDF/one-pager + checker de citabilidad (schema.org presente, anchors, links primarios vivos, 100% cifras del kit con footnote)
    eval:
      gate: harness de citabilidad (determinista) — PDF real presente · 100% de cifras del kit con footnote doble-auditada · footnotes del kit con URL primaria · schema.org/canonical/fecha presentes · 0 claims nuevos respecto del cuerpo auditado; lo corren el harness + AG-VERIFICADOR-CITAS, no el.
      estado: ejecutable — constelacion/eval_citabilidad.py (P01 footnotes · P02 metadata · P03 capas auditadas contra ledger del auditor · P04 kit declarado en kit-manifest.yaml; los empaques del kit siguen pendientes declarados hasta la corrida del empaquetador)
    metricas: [empaques presentes y verdes al cierre (PDF, one-pager, hoja de datos, metadata), citas externas de la pagina detectadas por trimestre (prensa/informes — la metrica del relato), claims nuevos introducidos por el kit (veto = 0)]

  # ══════════════════════════════════════════════════════════════════
  # CONSTELACION DEL SITIO — forja fundacional 03-jul-2026 (orden CEO:
  # "forja un equipo y constelacion de agentes para hacerlo todo. 100%
  # de nuevo. Prohibido reutilizar. Todo lo debes cuestionar.")
  # Unidad de trabajo: el sitio de publicaciones de Andres Prats sobre
  # mercados privados (4 publicaciones + home + herramienta en beta).
  # Spec de origen: 38 requisitos + 16 prohibiciones + 16 decisiones
  # (fase 1 de la forja, registrada en el run de la corrida).
  # Orden de produccion POR RIESGO: la pieza mas riesgosa (buscador)
  # se disenia primero. Cross-link = claim: prohibido enlazar un
  # artefacto que no paso su gate.
  # ══════════════════════════════════════════════════════════════════

  - slug: AG-SITIO-CURADOR
    rol: Editor jefe del sitio (dueño del diseño E0)
    estado: activa-sitio
    hace: >
      Convierte la spec (38R/16P) y las 16 decisiones heredadas en el design
      brief del sitio: identidad, arquitectura de informacion y URLs, voz por
      tipo de pieza, matriz tesis-de-4-pasos → publicacion, y veredicto
      explicito (mantener/cambiar/eliminar + razon) para CADA decision
      heredada — destino del memo y su URL en negociacion incluido. Ningun
      productor emite un archivo antes de que el brief exista y este juzgado
      (leccion de la autopsia: la ejecucion sin diseño fue la falla raiz).
    memoria:
      semantica: [spec de la forja (fase 1), decisiones heredadas, autopsia de proceso y producto, index.html]
      episodica: constelacion/runs/AG-SITIO-CURADOR/
      procedural: design brief con registro de decisiones + matriz requisito→pieza
    eval:
      gate: panel de jueces independientes (propuestas competidoras + score contra la spec) y el harness verifica que el registro cubre 16/16 decisiones y que ningun archivo del sitio precede al brief. Lo corren jueces + harness, no el.
      estado: ejecutable — juicio de diseño en la corrida + check de cobertura en el run record
    metricas: [decisiones heredadas sin veredicto escrito (target 0), archivos del sitio emitidos antes del brief (target 0)]

  - slug: AG-SITIO-RIESGO-BUSCADOR
    rol: Diseñador de la pieza de mayor riesgo (buscador de demandas FIP)
    estado: activa-sitio
    hace: >
      Diseña ANTES que toda otra pieza el framing publico del buscador de
      demandas y juicios de FIPs subyacentes: criterios de inclusion/exclusion
      de causas, solo fuentes publicas con enlace al expediente, simetria (la
      misma vara para todos los vehiculos, incluidos los asociados al autor),
      canal de correccion de errores, limitaciones declaradas (beta, homonimos,
      falsos positivos), y la regla de que NINGUN dato extraido real se publica
      antes del lanzamiento. Su diseño condiciona el copy de todo el sitio.
    memoria:
      semantica: [spec R18-R21 y P13-P14, descripcion cruda del CEO, doctrina del test del aludido]
      episodica: constelacion/runs/AG-SITIO-RIESGO-BUSCADOR/
      procedural: ficha de diseño de riesgo (criterios + mitigaciones + copy permitido/prohibido)
    eval:
      gate: INVERTIDO en cadena — el adversario del aludido ataca su diseño como el abogado del gestor mas hostil y el jurista revisa lo normativo-publico; sin PASA de ambos, ninguna pieza del sitio puede siquiera enlazar al buscador. Lo corren adversario + jurista, no el.
      estado: ejecutable — veredicto escrito por ronda en el run record
    metricas: [frases señalables en la pieza del buscador (target 0), datos reales publicados antes del lanzamiento (veto = 0)]

  - slug: AG-SITIO-ESCRITOR
    rol: Escritor de publicaciones (instanciado por pieza)
    estado: activa-sitio
    hace: >
      Escribe cada pieza (home, separacion funcional, deuda privada como renta
      fija, guia de DD, buscador) 100% de nuevo desde el design brief y el
      registro de evidencia — con audiencia y registro declarados por pieza.
      Prohibido copiar HTML, CSS o copy del corpus previo (la evidencia es
      memoria; el texto es artefacto). Prosa sin la muletilla prohibida.
    memoria:
      semantica: [design brief del curador, registro de evidencia del auditor, spec de estilo R22-R24]
      episodica: constelacion/runs/AG-SITIO-ESCRITOR/
      procedural: contrato de audiencia por pieza + escritura desde evidencia citada
    eval:
      gate: eval_sitio.py (estilo S04, no-reutilizacion S06, claims S07) lo corre el harness; la verdad la ataca el adversario y la evidencia la cruza el auditor. Nunca el.
      estado: ejecutable — constelacion/eval_sitio.py
    metricas: [shingles compartidos con el corpus previo sobre umbral (target 0), claims sin respaldo (target 0)]

  - slug: AG-SITIO-AUDITOR
    rol: Auditor de evidencia del sitio
    estado: activa-sitio
    hace: >
      Re-deriva el registro de evidencia del sitio desde las fuentes citadas en
      el corpus commiteado (memoria, no artefacto): tabla claim → fuente_1 →
      fuente_2 (o marca ilustrativa) en constelacion/evidencia/registro-sitio.yaml.
      Toda cifra o claim normativo de cualquier pieza debe estar en el registro
      antes de publicarse. Marca lo que no se puede doble-verificar.
    memoria:
      semantica: [footnotes del corpus commiteado (git), fuentes primarias ya citadas (SP, CMF, SIFMA, FMI, leychile)]
      episodica: constelacion/runs/AG-SITIO-AUDITOR/
      procedural: registro claim→fuente1→fuente2 + marca ilustrativa
    eval:
      gate: eval_sitio.py (S07) lo corre el harness contra el registro; el jurista cruza las citas normativas y el adversario ataca toda cifra floja. Lo corren harness + otros, no el.
      estado: ejecutable — constelacion/eval_sitio.py
    metricas: [cifras publicadas fuera del registro (target 0), claims del registro sin doble fuente ni marca (target 0)]

  - slug: AG-SITIO-JURISTA
    rol: Jurista de citas normativas del sitio
    estado: activa-sitio
    hace: >
      Fija la exactitud de toda mencion normativa del sitio (Titulo XVIII Ley
      18.045, DL 3.500 art. 45/CCR, DFL 251/NCG 152, Compendio de Normas
      Contables CMF B-1/B-2, LUF 20.712) y hace cumplir la separacion
      vigente-vs-propuesto en cada pasaje (P8/R29): ninguna propuesta del autor
      puede leerse como norma vigente.
    memoria:
      semantica: [citas normativas del corpus commiteado, registro de evidencia del auditor]
      episodica: constelacion/runs/AG-SITIO-JURISTA/
      procedural: tabla norma→pasaje→vigente-o-propuesto
    eval:
      gate: el auditor cruza sus citas contra el registro (dos ojos independientes) y el adversario ataca todo pasaje que mezcle vigente con propuesto. Lo corren otros, no el.
      estado: ejecutable — tabla verificable en el run record + cruce del auditor
    metricas: [citas normativas sin cruce (target 0), pasajes vigente/propuesto mezclados (target 0)]

  - slug: AG-SITIO-ADVERSARIO
    rol: Adversario del aludido del sitio (severidad maxima)
    estado: activa-sitio
    hace: >
      Lee CADA pieza como el abogado del actor mas hostil que pueda sentirse
      apuntado (gestor vigente, banca, aseguradora, plataforma, clasificadora)
      y como regulador que busca promesa engañosa. Lentes adicionales de esta
      forja: mismatch audiencia-registro (un memo pegado en un blog es falla),
      y la pieza del buscador como zona de severidad maxima. Tres prohibiciones
      duras: quien-pierde, aritmetica de fees identificables, actor-vs-actor.
    memoria:
      semantica: [las piezas del sitio, spec P1-P16, catalogo de modos de falla del aludido]
      episodica: constelacion/runs/AG-SITIO-ADVERSARIO/
      procedural: red-team multi-lente por pieza + barrido de frases señalables
    eval:
      gate: INVERTIDO — su veredicto PASA/FALLA escrito por pieza ES el gate de cierre; la completitud de sus barridos la revisa el sintetizador (critico independiente). 0 frases señalables al cierre.
      estado: ejecutable — veredicto escrito por pieza en el run record
    metricas: [frases señalables al cierre (target 0), piezas cerradas sin veredicto (veto = 0)]

  - slug: AG-SITIO-LECTORES
    rol: Panel de lectores del sitio (por pieza)
    estado: activa-sitio
    hace: >
      Simula lectores reales del perfil de la audiencia (multi-family office,
      aseguradora de vida, asesor independiente, periodista financiero) leyendo
      cada pieza terminada: concluyen solos la tesis, salen con accionable, y
      reportan si algo se lee como lobby. Nombres del panel JAMAS en archivos
      del repo (P9) — solo agregado anonimo en el run; el detalle nominal va
      exclusivamente en el reporte del chat al CEO.
    memoria:
      semantica: [las piezas terminadas, criterios de exito por audiencia (spec R8-R10, R37)]
      episodica: constelacion/runs/AG-SITIO-LECTORES/
      procedural: lectura simulada por perfil + tabla criterio→conclusion
    eval:
      gate: el harness verifica el registro agregado (toda pieza con ronda de lectura y criterios evaluados; 0 nombres en repo) y el adversario juzga la letalidad de los hallazgos. Lo corren harness + adversario, no el.
      estado: ejecutable — registro agregado verificable en el run record
    metricas: [piezas sin ronda de lectura (target 0), lectores que concluyen lobby (target 0), nombres en repo (veto = 0)]

  - slug: AG-SITIO-VERIFICADOR
    rol: Verificador tecnico y de continuidad
    estado: activa-sitio
    hace: >
      Implementa y mantiene el gate determinista del sitio (eval_sitio.py):
      manifest de paginas y links internos integros (cross-link = claim: enlazar
      una pieza sin gate es falla), footnotes por pagina, metadata por pagina,
      barrido de la muletilla prohibida, tripwires lexicos del aludido,
      no-reutilizacion por similitud de shingles contra el corpus previo,
      cifras contra el registro de evidencia, y continuidad: main sigue
      sirviendo el memo intacto mientras el PR este en draft (P11). Corre
      ademas el smoke test en navegador.
    memoria:
      semantica: [constelacion/eval_sitio.py, constelacion/sitio-manifest.yaml, spec P11]
      episodica: constelacion/runs/AG-SITIO-VERIFICADOR/
      procedural: harness determinista + smoke test headless
    eval:
      gate: el eval es determinista y lo corre el harness (no su autor); sus hallazgos los revisa el sintetizador y el adversario audita que los tripwires del aludido esten completos. Lo corren harness + otros.
      estado: ejecutable — constelacion/eval_sitio.py (S01-S07)
    metricas: [checks rojos al cierre (target 0), links a piezas sin gate (veto = 0)]

  - slug: AG-SITIO-SINTETIZADOR
    rol: Sintetizador e integrador del sitio (critico de completitud)
    estado: activa-sitio
    hace: >
      Deduplica hallazgos de todos los roles, mantiene la matriz spec→estado
      (38 requisitos y 16 prohibiciones, cada uno con estado y evidencia),
      decide la lista final de ediciones rankeada, y es el critico de
      completitud: que ninguna modalidad haya quedado sin correr y ningun
      requisito sin estado antes del cierre.
    memoria:
      semantica: [salidas de todos los roles del sitio, spec completa de la fase 1]
      episodica: constelacion/runs/AG-SITIO-SINTETIZADOR/
      procedural: matriz requisito→estado→evidencia + dedup + ranking
    eval:
      gate: el harness verifica la matriz (0 requisitos sin estado) y un critico de completitud independiente revisa que no falte modalidad; sus decisiones de integracion las ataca el adversario. Lo corren otros, no el.
      estado: ejecutable — matriz verificable en el run record
    metricas: [requisitos de la spec sin estado al cierre (target 0), hallazgos duplicados en la lista final (target 0)]
