  - texto: >-
      2008 fue securitizar a ciegas: opacidad, originar para vender sin riesgo
      propio y tramos re-securitizados. La respuesta regulatoria posterior
      (Reglamento UE 2017/2402; Dodd-Frank, 2010) invirtió esas tres causas.
    fuente_1: "Financial Crisis Inquiry Report (FCIC, 2011)"
    fuente_2: "Normativa post-crisis citada en fn20 (Reglamento UE 2017/2402; Dodd-Frank §941 / Regulation RR) + informes BIS/FSB post-2008"

