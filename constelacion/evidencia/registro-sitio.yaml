      5% del riesgo. Referencias: Reglamento (UE) 2017/2402, art. 6; EE.UU.,
      Dodd-Frank §941 (que incorpora el §15G a la Securities Exchange Act de
      1934) y la Regulation RR de 2014 (SEC). Estándar internacional citado como
      referencia de diseño; no es normativa chilena vigente.
    fuente_1: "EUR-Lex, Reglamento (UE) 2017/2402, art. 6 (fn20)"
    fuente_2: "SEC, Regulation RR (2014) / Securities Exchange Act §15G vía Dodd-Frank §941 (fn20)"

