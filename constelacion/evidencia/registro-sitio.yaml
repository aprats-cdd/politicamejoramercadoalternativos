  # ── fn14 · Costo de Fund Administration (estimación del autor) ──
  - texto: >-
      Un Fund Admin global cobra entre 3 y 7 puntos base (3-7 bps) sobre AUM
      para fondos de deuda privada; para un fondo de USD 100M el costo anual es
      de USD 30.000-70.000 (USD 30-70K), comparable a una posición de
      back-office internalizada.
    ilustrativo: true
    nota: >-
      Degradado por auditoría adversarial 2026-07-03: la fuente que traía el
      memo ("EFAMA / Monterone Partners, Fund Administration Industry Survey
      2024") NO es verificable — Monterone Partners LLP es un hedge fund
      long/short de renta variable sin research de fund administration, y
      EFAMA no registra ese survey en su catálogo. NO citar esa atribución en
      ninguna pieza. El rango 3-7 bps se publica como estimación ilustrativa
      del autor (experiencia directa contratando la función), con la
      derivación aritmética (3-7 bps × USD 100M = USD 30.000-70.000) como
      única verificación. El memo (index.html fn14) arrastra la atribución
      original — pendiente de corrección propia.

