  # ── Hoja de ruta (propuesta del autor) ──
  - texto: >-
      Hoja de ruta propuesta en tres capas: Capa B, 9-15 meses, solo CMF + SP,
      sin Congreso; Capa A1, 24-36 meses, el Congreso codifica (art. 15 LUF);
      Capa A2, 36-48 meses, custodio regulado (Congreso + BCCH). Transición
      escalonada: AGFs grandes 24 meses, medianas 36 meses, pequeñas 48 meses.
      Pasaporte expedito de 60 días. Chile puede implementar la separación
      funcional en 9 meses, sin Congreso.
    ilustrativo: true
    nota: >-
      Calendario propuesto por el autor (memorándum, Actos de reforma). No son
      plazos observados ni norma vigente; toda pieza debe presentarlos como
      propuesta de política pública.

