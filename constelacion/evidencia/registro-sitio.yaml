  # ── fn16 · Renta fija global vs private credit ──
  - texto: >-
      El universo global de renta fija es del orden de USD 145 billones
      (millones de millones); el de private credit, unos USD 2,1 billones
      (variante 2.1 — incluido capital comprometido). El múltiplo es cerca de
      70 veces (70×) — magnitud de orden, no cifra exacta; el rango defendible
      es 65-85×.
    fuente_1: "SIFMA, Capital Markets Fact Book 2024 (~USD 145 billones), consistente con estadísticas de títulos de deuda del BIS (fn16)"
