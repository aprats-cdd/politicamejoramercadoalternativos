      la Circular 22/811 de la CSSF. Luxemburgo administra hoy EUR 5.9 billones
      (variante 5,9T).
    fuente_1: "EUR-Lex, Directiva 2011/61/UE + SEC (Custody Rule 206(4)-2, adopting release dic. 2009) (fn11)"
    fuente_2: "FCA (transposición UK 2013) + CSSF (Circular 22/811 y estadísticas de AUM de Luxemburgo) + EFAMA Fact Book"
    nota: >-
      Corrección adversarial 2026-07-03: el fn11 del memo databa "Dodd-Frank
      §404 (implementación SEC 2009)" — imposible (Dodd-Frank es de julio
