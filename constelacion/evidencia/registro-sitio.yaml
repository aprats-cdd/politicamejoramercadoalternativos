  # ── fn17 · Securitización, Ley 18.045 ──
  - texto: >-
      La securitización está regulada en Chile desde 1994 en el Título XVIII de
      la Ley N° 18.045 de Mercado de Valores (arts. 132 y siguientes). El
      patrimonio separado de cada emisión (art. 135) aísla los activos de la
      quiebra de la securitizadora y del originador (bankruptcy remoteness).
    fuente_1: "Ley N° 18.045, Título XVIII, texto vigente en leychile.cl (fn17)"
    fuente_2: "CMF, normativa aplicable a sociedades securitizadoras (registro y regulación de emisiones)"
    nota: "fn17 declara: citas sujetas a revisión legal contra el texto vigente. AG-SITIO-JURISTA debe cruzar antes del cierre."

  # ── fn18 · Elegibilidad AFP: DL 3.500 ──
  - texto: >-
      Las AFP pueden adquirir instrumentos de deuda bajo el art. 45 del
      DL 3.500 (N° 3.500), vía la Comisión Clasificadora de Riesgo (CCR,
      Título XI), con
      clasificación mínima de riesgo. Un bono securitizado clasificado computa
      como renta fija, no como activo alternativo.
    fuente_1: "DL N° 3.500, art. 45 y Título XI, texto vigente en leychile.cl (fn18)"
    fuente_2: "SP, Régimen de Inversión de los Fondos de Pensiones + normativa de la CCR (procedimientos de aprobación)"

  # ── fn19 · Seguros: DFL 251 y NCG 152 ──
  - texto: >-
      Las compañías de seguros invierten reservas técnicas y patrimonio de
      riesgo bajo el DFL N° 251 (Ley de Seguros), art. 21, y la NCG N° 152 de
      la CMF: clasificación mínima BBB / N-3 y custodia de al menos 98% en
      empresas de depósito de valores reguladas por la Ley N° 18.876.
    fuente_1: "DFL N° 251, art. 21, texto vigente en leychile.cl (fn19)"
    fuente_2: "CMF, NCG N° 152 (inversiones representativas y custodia) (fn19)"

