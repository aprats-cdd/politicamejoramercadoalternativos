# Ledger de calibración del loop de mejora — lo mantiene AG-EDITORIAL-CALIBRADOR.
#
# Cada objeción real (de un lector, un regulador, la prensa) que el
# AG-SITIO-ADVERSARIO NO anticipó antes de publicar se registra acá y se
# convierte en una PROPUESTA de tripwire. El cierre del loop es AUDITABLE
# (L01 de eval_editorial.py, fail-closed): toda entrada con
# objecion_no_anticipada: true debe tener su tripwire_ref commiteado DESPUÉS
# de la entrada. Sin ese tripwire, el loop no cerró — y el harness lo bloquea.
#
# El calibrador PROPONE; AG-SITIO-VERIFICADOR commitea el tripwire al harness
# (single-writer del gate). Así el loop de mejora no puede erosionar en
# silencio la vara que debe atraparlo.
#
# KPI del loop: golpes del adversario no anticipados por pieza → tiende a 0 a
# medida que se acumulan tripwires. La pieza N+1 es mejor que la N solo si ese
# contador baja. "Afiné la voz" sin ese contador es teatro.
#
# Schema por entrada:
#   pieza: archivo.html
#   fecha: YYYY-MM-DD
#   objecion: la objeción real, en una frase
#   fuente: quién la levantó (agregado/anónimo si es lector — nombres jamás
#           en el repo, P9; el detalle nominal solo al chat del CEO)
#   objecion_no_anticipada: true|false
#   tripwire_ref: dónde quedó el tripwire nuevo (archivo + commit), si aplica
#   propuesta_voz: regla nueva propuesta para voz-de-la-casa.md, si aplica

entradas:
  # Corrida 1 del motor (04-jul-2026) · opinión "cupo de renta fija".
  # El loop de mejora funcionando: el adversario cazó una muletilla que el
  # harness determinista NO anticipó → tripwire nuevo commiteado.
  - pieza: opinion-cupo-renta-fija.html
    fecha: 2026-07-04
    objecion: >-
      El adversario cazó "estructura y disciplina, no de permiso especial" —
      familia muletilla en orden afirmación-primero ("X, no Y"). El check S04 de
      eval_sitio solo mira la forma negación-primero ("no es X, es Y") y la dejó
      pasar. La pieza se corrigió a "verificable sin permiso especial".
    fuente: AG-SITIO-ADVERSARIO (lente voz Lakpa), corrida 1
    objecion_no_anticipada: true
    tripwire_ref: "constelacion/eval_editorial.py :: E10 (advisory) — commiteado en esta misma corrida, DESPUÉS de la objeción"
    propuesta_voz: >-
      La regla 6 de voz-de-la-casa.md ya prohíbe la muletilla; E10 extiende la
      detección a la forma afirmación-primero. Se deja ADVISORY (no hard)
      porque la frontera juicio/hecho usa la familia legítimamente ("una
      apuesta del autor, no un dato") y un gate determinista sobre el tono
      false-positivearía la agudeza. El humano decide sobre cada marca.

  # Corrida 2 del motor (04-jul-2026) · ensayo "palanca del patrimonio".
  # El adversario cazó un defecto ARITMÉTICO que ningún gate determinista
  # anticipaba: un múltiplo en prosa que no ataba con los pesos que la propia
  # pieza enunciaba. Loop de mejora → tripwire nuevo commiteado.
  - pieza: renta-fija-palanca-patrimonio.html
    fecha: 2026-07-04
    objecion: >-
      El adversario cazó "dos a tres veces más … que pesa un décimo": la mitad
      (~50%) ÷ un décimo (10%) = 5×, no 2-3×. El múltiplo enunciado no ataba con
      los pesos que la prosa declaraba; un banquero numérico lo calcula al
      margen y la autoridad por sobriedad se resiente. La pieza se corrigió a
      "del orden de la mitad de la cartera … que rara vez pasa de un quinto"
      (~50% / ~20% = 2,5×, dentro de "dos a tres" y del rango 5-25%).
    fuente: AG-SITIO-ADVERSARIO (lente overclaim/aritmética), corrida 2
    objecion_no_anticipada: true
    tripwire_ref: "constelacion/eval_editorial.py :: E11 (advisory) — commiteado en esta misma corrida, DESPUÉS de la objeción"
    propuesta_voz: >-
      Ninguna regla nueva de voz: la regla 12 (sin vaguedades, un número o
      nada) ya cubre el caso. E11 es el sensor operativo: marca todo claim
      multiplicativo ("N veces más/menos") para que un humano verifique que ata
      con los rangos/pesos que la pieza enuncia. ADVISORY porque un múltiplo
      puede ser correcto; el gate no computa fracciones-en-palabras sin teatro.
