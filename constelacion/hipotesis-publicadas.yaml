# Ledger de hipótesis publicadas — lo mantiene AG-EDITORIAL-CALIBRADOR.
#
# Una hipótesis publicada es una creencia FALSABLE del autor, expuesta en
# público con su condición de falsación. El calibrador la sigue hasta que la
# realidad la confirma o la falsa, y anota qué tan bien calibrada estaba —
# ése es el núcleo del loop de mejora: el autor aprende cuán buenas son sus
# creencias contra el mundo, no contra su propia opinión.
#
# Schema por entrada:
#   id: HIP-YYYY-NN
#   pieza: archivo.html
#   asercion: la afirmación falsable, en una frase
#   horizonte: cuándo debería verse (fecha o condición temporal)
#   falsador: el hecho observable que la falsaría
#   fecha_publicacion: YYYY-MM-DD
#   estado: viva | confirmada | falsada
#   evidencia: []   # se llena cuando el horizonte llega
#   calibracion: ''  # nota del calibrador post-outcome
#
# Regla dura: una hipótesis sin los tres campos (aserción + horizonte +
# falsador) NO se publica (E02 de eval_editorial, fail-closed). Publicar una
# creencia que la realidad puede tumbar es el estándar; esconder el falsador
# para no quedar mal es lo prohibido.

hipotesis:

  # HIP-2026-01 · nacida del análisis del deck de Apollo sobre Private
  # Investment Grade (04-jul-2026, run 2026-07-04-analisis-apollo-ig.md).
  # Apollo construye hoy en EE.UU. la infraestructura de liquidez del IG
  # privado (marketplace propio, ETFs público-privados con State Street,
  # ventanas de rescate a 30 días). La creencia falsable: esa tratabilidad
  # llega también a Chile y erosiona el premio de iliquidez que hoy separa
  # a la deuda privada de la renta fija líquida. Checkpoint del CEO: sí.
  - id: HIP-2026-01
    pieza: renta-fija-palanca-patrimonio.html
    asercion: >-
      Antes de julio de 2029, al menos un vehículo de deuda privada verificable
      en Chile ofrecerá a inversionistas institucionales liquidez secundaria
      estructurada o ventana de rescate periódica — la misma tratabilidad que
      hoy se cree exclusiva de la renta fija pública.
    horizonte: julio de 2029 (36 meses desde la publicación)
    falsador: >-
      Si a julio de 2029 ningún vehículo de deuda privada local ofrece a
      institucionales liquidez secundaria estructurada ni ventana de rescate
      periódica, la hipótesis queda falsada.
    fecha_publicacion: 2026-07-04
    estado: viva
    evidencia: []
    calibracion: ''
